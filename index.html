<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>StrukturPLTA - AR.js</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- AR.js untuk A-Frame -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    .arjs-loader {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .arjs-loader div {
      text-align: center;
      font-size: 1.25em;
      color: white;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <!-- Loader saat AR.js sedang menyiapkan kamera -->
  <div class="arjs-loader">
    <div>Memuat AR, mohon tunggu...</div>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >

    <!-- Marker Hiro (marker bawaan AR.js, bisa dicetak dari internet: "AR.js Hiro marker") -->
    <a-marker preset="hiro">

      <!-- Teks nama proyek yang ditampilkan di atas marker -->
      <a-text
        value="StrukturPLTA"
        color="#FFFFFF"
        align="center"
        position="0 0.5 0"
        rotation="-90 0 0"
        width="4"
        scale="1 1 1"
      ></a-text>

      <!-- Background sederhana di belakang teks agar lebih jelas -->
      <a-plane
        color="#2196F3"
        opacity="0.6"
        rotation="-90 0 0"
        position="0 0 0"
        width="1.5"
        height="0.6"
      ></a-plane>

    </a-marker>

    <!-- Kamera AR -->
    <a-entity camera></a-entity>

  </a-scene>

  <script>
    // Sembunyikan loader default setelah scene siap
    document.querySelector('a-scene').addEventListener('loaded', function () {
      var loader = document.querySelector('.arjs-loader');
      if (loader) loader.style.display = 'none';
    });
  </script>

</body>
</html>
