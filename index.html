<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR STRUKTUR PLTA</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.x/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-assets>
      <audio id="musik-bg" src="ssstik.io_1784012772380.mp3" preload="auto"></audio>
    </a-assets>
    <script>
      // Touch/drag rotation for the model (works on mobile and desktop)
      AFRAME.registerComponent('touch-rotate', {
        init: function () {
          this.isDown = false;
          this.lastX = 0;
          this.lastY = 0;
          this.rotX = 0;
          this.rotY = 0;

          const start = (x, y) => { this.isDown = true; this.lastX = x; this.lastY = y; };
          const move = (x, y) => {
            if (!this.isDown) return;
            const dx = x - this.lastX;
            const dy = y - this.lastY;
            this.rotY += dx * 0.5;
            this.rotX += dy * 0.5;
            this.el.object3D.rotation.set(
              THREE.MathUtils.degToRad(this.rotX),
              THREE.MathUtils.degToRad(this.rotY),
              0
            );
            this.lastX = x;
            this.lastY = y;
          };
          const end = () => { this.isDown = false; };

          window.addEventListener('touchstart', (e) => start(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
          window.addEventListener('touchmove', (e) => move(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
          window.addEventListener('touchend', end);
          window.addEventListener('mousedown', (e) => start(e.clientX, e.clientY));
          window.addEventListener('mousemove', (e) => move(e.clientX, e.clientY));
          window.addEventListener('mouseup', end);
        }
      });
    </script>

    <a-marker preset="hiro" id="marker-utama">
      <a-entity gltf-model="PLTAAA.glb"
                scale="0.3 0.3 0.3"
                position="0 0.3 0"
                rotation="0 0 0"
                touch-rotate
                animation__spin="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
                animation-mixer="clip: *; loop: repeat">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector('#marker-utama');
    const musik = document.querySelector('#musik-bg');

    marker.addEventListener('markerFound', () => {
      musik.play().catch(() => { }); // catch biar gak error kalau browser blokir autoplay
    });

    marker.addEventListener('markerLost', () => {
      musik.pause();
    });
  </script>

</body>

</html>
