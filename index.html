<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>StrukturPLTA - AR.js</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- AR.js untuk A-Frame -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    .arjs-loader {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .arjs-loader div {
      text-align: center;
      font-size: 1.25em;
      color: white;
    }
    .hint {
      position: fixed;
      bottom: 16px;
      left: 0;
      width: 100%;
      text-align: center;
      color: white;
      font-family: sans-serif;
      font-size: 0.9em;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
      z-index: 999;
      pointer-events: none;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <!-- Loader saat AR.js sedang menyiapkan kamera -->
  <div class="arjs-loader">
    <div>Memuat AR, mohon tunggu...</div>
  </div>

  <div class="hint">Geser jari di layar untuk memutar model</div>

  <script>
    // Komponen: otomatis menyesuaikan ukuran & posisi model supaya pas di frame marker
    // (mengatasi model yang tampil "zoom"/kegedean atau posisinya menembus marker)
    AFRAME.registerComponent('auto-fit', {
      schema: {
        size: { type: 'number', default: 1 } // target ukuran terbesar model (dalam satuan marker)
      },
      init: function () {
        this.el.addEventListener('model-loaded', (evt) => {
          const mesh = evt.detail.model;
          if (!mesh) return;

          const box = new THREE.Box3().setFromObject(mesh);
          const size = new THREE.Vector3();
          box.getSize(size);

          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const scaleFactor = this.data.size / maxDim;
          this.el.object3D.scale.set(scaleFactor, scaleFactor, scaleFactor);

          // Pusatkan model & dudukkan di atas marker (bukan menembus/melayang aneh)
          const center = new THREE.Vector3();
          box.getCenter(center);
          mesh.position.x -= center.x;
          mesh.position.z -= center.z;
          mesh.position.y -= box.min.y;
        });
      }
    });

    // Komponen: putar model manual pakai jari (drag di layar)
    AFRAME.registerComponent('touch-rotate', {
      init: function () {
        this.rotX = 0;
        this.rotY = 0;
        this.isDown = false;
        this.lastX = 0;
        this.lastY = 0;

        const start = (x, y) => { this.isDown = true; this.lastX = x; this.lastY = y; };
        const move = (x, y) => {
          if (!this.isDown) return;
          const dx = x - this.lastX;
          const dy = y - this.lastY;
          this.rotY += dx * 0.5;
          this.rotX += dy * 0.5;
          this.el.object3D.rotation.set(
            THREE.MathUtils.degToRad(this.rotX),
            THREE.MathUtils.degToRad(this.rotY),
            0
          );
          this.lastX = x;
          this.lastY = y;
        };
        const end = () => { this.isDown = false; };

        window.addEventListener('touchstart', (e) => {
          const t = e.touches[0];
          start(t.clientX, t.clientY);
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
          const t = e.touches[0];
          move(t.clientX, t.clientY);
        }, { passive: true });

        window.addEventListener('touchend', end);

        // Dukungan mouse juga (untuk tes di laptop/desktop)
        window.addEventListener('mousedown', (e) => start(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', end);
      }
    });
  </script>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >

    <!-- Daftar aset: model 3D PLTAAA.glb (letakkan file ini satu folder dengan index.html) -->
    <a-assets>
      <a-asset-item id="modelPLTA" src="PLTAAA.glb"></a-asset-item>
    </a-assets>

    <!-- Marker Hiro (marker bawaan AR.js, bisa dicetak dari internet: "AR.js Hiro marker") -->
    <a-marker preset="hiro" id="marker-utama">

      <!-- Wrapper: yang diputar manual oleh jari, ukuran otomatis pas di marker -->
      <a-entity
        id="model-wrapper"
        gltf-model="#modelPLTA"
        auto-fit="size: 1"
        touch-rotate
        position="0 0.3 0"
      ></a-entity>

      <!-- Teks nama proyek yang ditampilkan di atas model -->
      <a-text
        value="StrukturPLTA"
        color="#FFFFFF"
        align="center"
        position="0 1.2 0"
        rotation="-90 0 0"
        width="4"
        scale="1 1 1"
      ></a-text>

    </a-marker>

    <!-- Kamera AR -->
    <a-entity camera></a-entity>

  </a-scene>

  <script>
    // Sembunyikan loader default setelah scene siap
    document.querySelector('a-scene').addEventListener('loaded', function () {
      var loader = document.querySelector('.arjs-loader');
      if (loader) loader.style.display = 'none';
    });
  </script>

</body>
</html>
