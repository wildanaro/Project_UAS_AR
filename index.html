<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR PLTA LISTRIK</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.x/dist/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <a-scene embedded>
        <a-assets>
            <audio id="musik-bg" src="audioplta.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker preset="hiro" id="marker-utama">
            <a-entity gltf-model="PLTAOK.glb" scale="0.3 0.3 0.3" position="0 0 0"
                animation-mixer="clip: *; loop: repeat">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
const startBtn = document.getElementById('start-ar');
const sceneEl = document.querySelector('a-scene');
const marker = document.querySelector('#marker-utama');
const musik = document.querySelector('#musik-bg');

startBtn.addEventListener('click', async () => {
  try {
    await navigator.mediaDevices.getUserMedia({ video: true });
    sceneEl.setAttribute('arjs', 'sourceType: webcam; debugUIEnabled: false;');
    startBtn.style.display = 'none';
  } catch (e) {
    console.error('Camera permission denied', e);
  }
});

marker.addEventListener('markerFound', () => {
  musik.play().catch(() => {});
});

marker.addEventListener('markerLost', () => {
  musik.pause();
});
</script>

</body>

</html>
